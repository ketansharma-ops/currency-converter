<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header>
        <nav class="navbar">
            <ul>
                <li class="name">Ketan Sharma</li>
                <li>Home</li>
                <li>About me</li>
                <li>My projects</li>
                <li>Contact me</li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="card">
            <div class="title">
                <h1>Currency Converter</h1>
            </div>
            <div class="from-amt input">
                <input type="number" name="" id="from-amt" placeholder="Enter the amount" class="input-bar">
            </div>
            <div class="select">
                <div class="from-select">
                    <img src="https://flagsapi.com/US/shiny/64.png">
                    <select name="from" id="from_opt" class="options">
                    </select>
                </div>
                <div class="icon-select">
                    <i class="fa-solid fa-arrow-left-long"></i>
                </div>
                <div class="to-select">
                    <img src="https://flagsapi.com/IN/shiny/64.png">
                    <select name="to" id="to_opt" class="options">
                    </select>
                </div>
            </div>
            <div class="to-amt input">
                <input type="number" name="" id="to-amt" placeholder="Amount Converted" class="input-bar">
            </div>
        </div>
    </main>
    <footer></footer>
    <script src="script.js"></script>
</body>
</html>
